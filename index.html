<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photography & Zines</title>
    <style>
        /* This is the CSS that makes it look clean and minimal */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333333;
        }
        
        /* Top Navigation Toolbar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            border-bottom: 1px solid #eeeeee;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            color: #333;
            letter-spacing: 1px;
        }
        nav a {
            margin-left: 30px;
            text-decoration: none;
            color: #888;
            font-size: 14px;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        nav a:hover {
            color: #000;
        }

        /* Main Content Layout */
        .container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }
        h1 {
            font-weight: normal;
        }

        /* Buy Button for Zines */
        .zine-button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #111;
            color: #fff;
            text-decoration: none;
            border-radius: 3px;
            font-size: 14px;
            transition: background 0.2s;
        }
        .zine-button:hover {
            background-color: #555;
        }

        /* Photo Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 60px;
        }
        .gallery img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* Placeholder styling (Remove this when you add real images) */
        .placeholder {
            background:#f9f9f9; 
            height:300px; 
            display:flex; 
            align-items:center; 
            justify-content:center;
            color: #ccc;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">Alex McDermott</a>
    <nav>
        <a href="index.html">Portfolio</a>
        <a href="about.html">About</a>
    </nav>
</header>

<div class="container">
    <h1>Documenting the world in black, white, and color.</h1>
    <p>Check out my latest photography zines, available now.</p>

    <a href="YOUR_STORE_LINK_HERE" class="zine-button">Buy My Latest Zine</a>

    <div class="gallery">
        <div class="placeholder">Thailand 2024</div>
        <div class="placeholder">Vietnam 2024</div>
        <div class="placeholder">Prague 2026</div>
        <div class="placeholder">Photo 4</div>
        <div class="placeholder">Photo 5</div>
        <div class="placeholder">Photo 6</div>
    </div>
</div>

</body>
</html>
