<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | My Photography</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333333;
        }
        
        /* Top Navigation Toolbar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            border-bottom: 1px solid #eeeeee;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            color: #333;
            letter-spacing: 1px;
        }
        nav a {
            margin-left: 30px;
            text-decoration: none;
            color: #888;
            font-size: 14px;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        nav a:hover {
            color: #000;
        }
        nav a.active {
            color: #000;
            font-weight: bold;
        }

        /* Portfolio Gallery */
        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }
        .gallery img {
            width: 100%;
            height: auto;
            display: block;
            background-color: #f9f9f9; /* Light gray placeholder while image loads */
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">Alex J. McDermott</a>
    <nav>
        <a href="index.html" class="active">Portfolio</a>
        <a href="zines.html">Zines</a>
        <a href="about.html">About</a>
    </nav>
</header>

<div class="container">
    <div class="gallery">
        <img src="photo1.jpg" alt="A brief description of the photo">
        <img src="photo2.jpg" alt="A brief description of the photo">
        <img src="photo3.jpg" alt="A brief description of the photo">
        <img src="photo4.jpg" alt="A brief description of the photo">
        <img src="photo5.jpg" alt="A brief description of the photo">
        <img src="photo6.jpg" alt="A brief description of the photo">
    </div>
</div>

</body>
</html>
